<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Patrick Torres — Full Stack Developer specializing in React, .NET, SQL Server, and Azure."
    />
    <meta property="og:title" content="Portfolio" data-dynamic-title />
    <meta name="twitter:title" content="Portfolio" data-dynamic-title />
    <title>Portfolio</title>
    <script>
      (function () {
        var stored = localStorage.getItem('theme')
        var theme =
          stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        document.documentElement.setAttribute('data-theme', theme)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
